# render.yaml — Fase 13 deploy config
#
# Per deployare su Render.com:
#  1. Crea account su https://render.com (free tier)
#  2. Push questo repo su GitHub
#  3. Su Render: New + → Blueprint → connetti il repo → Render legge questo file
#  4. Compila il valore di SESSION_SECRET (oppure lascia che Render lo generi)
#  5. Attendi il primo deploy (~2 minuti)
#
# Render legge il file e crea:
#  • 1 web service Node.js
#  • 1 disk persistente da 1GB montato su /data (per il file SQLite)
#
# Lo script `start` già legge process.env.PORT (iniettato da Render).
# DB_PATH viene settato a /data/synesthesia.sqlite così il file sopravvive ai redeploy.

services:
  - type: web
    name: synesthesia
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node app.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DB_PATH
        value: /data/synesthesia.sqlite
    disk:
      name: synesthesia-data
      mountPath: /data
      sizeGB: 1
    healthCheckPath: /
    autoDeploy: true
